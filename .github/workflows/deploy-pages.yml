name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Enable Corepack (pnpm from packageManager)
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (GitHub Pages)
        env:
          # For project sites, the correct base path is "/<repo-name>/".
          # For user sites / custom domains, set repo variable PAGES_BASE_PATH to "/".
          VITE_BASE: ${{ vars.PAGES_BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: pnpm -s run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
