<!doctype html>
<html lang="zh-TW" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>羅揚文｜作品集</title>
    <meta
      name="description"
      content="羅揚文（Yang-Wen Luo）作品集：全端工程師，聚焦企業系統現代化與整合（Legacy/ERP → Web + API）。"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- GitHub Pages SPA fallback:
         - `client/public/404.html` redirects deep links to `/?p=/deep/link`
         - This script restores the original path on first load. -->
    <script>
      (function () {
        try {
          var search = window.location.search;
          if (!search || search.length < 2) return;
          var params = new URLSearchParams(search);
          var p = params.get("p");
          if (!p) return;
          var q = params.get("q") || "";
          var newUrl =
            window.location.pathname.replace(/\\/+$/, "") +
            p +
            (q ? "?" + q : "") +
            window.location.hash;
          window.history.replaceState(null, "", newUrl);
        } catch (e) {
          // no-op
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
